services:
  acme-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: acme-api:local
    environment:
      ACME_API_CONFIG: /config/config.yaml
      ACME_API_HOST: 0.0.0.0
      ACME_API_PORT: "8080"
    ports:
      - 8080:8080
    volumes:
      - ./docker/config.yaml:/config/config.yaml:ro
      - acme-api-data:/data
      - acme-api-certificates:/certificates
      - acme-api-acmesh:/acmesh
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  acme-api-data:
  acme-api-certificates:
  acme-api-acmesh:

