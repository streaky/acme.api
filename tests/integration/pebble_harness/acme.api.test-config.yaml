log:
  level: INFO
  format: json

database:
  url: sqlite+aiosqlite:////tmp/acme-api-pebble-harness/data/acme.db

deployment:
  directory: /tmp/acme-api-pebble-harness/certificates

acme:
  binary_path: /usr/local/bin/acme.sh
  home_dir: /tmp/acme-api-pebble-harness/acmesh

renewal:
  enabled: true
  window_days: 1
dns_providers:
  - name: cloudflare-test
    provider_name: cloudflare
    env_vars_file_path: /fixtures/sample_dns.env

acme_accounts:
  - name: pebble-local
    server_url: http://pebble:14000/directory
