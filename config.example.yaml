# acme.api — Example Configuration
# Copy this file to `config.yaml` and adjust values for your environment.
# Path: set ACME_API_CONFIG=/path/to/config.yaml (or leave unset; cwd is searched)

log:
  level: INFO          # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: json         # json or text

database:
  url: sqlite+aiosqlite:///data/acme.db
  pool_size: 5

deployment:
  # Directory mounted read/write only by acme.api. Consumers should mount it read-only.
  directory: /certificates
  permissions_cert: 420 # 0o644 in decimal
  permissions_key: 384 # 0o600 in decimal
  # Optional numeric supplementary group for read-only certificate consumers.
  # acme.api must run as a member of this group to assign it to artifacts.
  # artifact_group_id: 10001

acme:
  binary_path: /usr/local/bin/acme.sh
  home_dir: /acmesh

renewal:
  enabled: true
  check_interval_hours: 24
  window_days: 30
  max_retries: 3
  shutdown_timeout_seconds: 30

webhooks:
  timeout_seconds: 5.0
  max_retries: 3
  backoff_seconds: 1.0

# Optional bootstrap API keys. Values are raw secrets read once and stored as
# hashes in SQLite if the named bootstrap key does not already exist.
api_keys:
  admin: change-me-admin-key
  operator: change-me-operator-key
  readonly: change-me-readonly-key

# DNS provider aliases referenced by name in the API.
# Each provider must have a credentials file with acme.sh-compatible env vars.
dns_providers:
  - name: production
    provider_name: cloudflare
    env_vars_file_path: /secrets/cloudflare.env

acme_accounts:
  - name: letsencrypt-production
    server_url: https://acme-v02.api.letsencrypt.org/directory
    # account_key_path is optional; defaults to a path inside acme.home_dir
