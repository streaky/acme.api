name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      run_pebble_harness:
        description: Run the Docker-backed Pebble DNS-01 integration harness
        required: false
        default: false
        type: boolean

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: make dev

      - name: Run local release gates
        run: make combined-check

      - name: Run Pebble integration harness
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_pebble_harness }}
        run: make test-harness
