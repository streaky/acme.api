name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  foundation:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"
      - name: Install reviewed uv release
        run: python -m pip install --disable-pip-version-check uv==0.11.29
      - name: Install locked development environment
        run: uv sync --locked
      - name: Verify lock and exports
        run: make deps-check
      - name: Verify hashed production install without dependency resolution
        run: |
          python -m venv /tmp/acme-api-release
          /tmp/acme-api-release/bin/python -m pip install --require-hashes --no-deps -r requirements.txt
      - name: Build and install acme.api without dependency resolution
        run: |
          uv build --no-build-isolation
          /tmp/acme-api-release/bin/python -m pip install --no-deps dist/acme_api-*.whl
          /tmp/acme-api-release/bin/python -c "import acme_api"
      - name: Run canonical verification gate
        run: make verify
